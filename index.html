<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>フラッシュ英語</title>

<style>

body{
    margin:0;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
    text-align:center;
}

header{
    background:#4CAF50;
    color:white;
    padding:20px;
    font-size:32px;
    font-weight:bold;
}

.container{
    margin:30px auto;
    max-width:500px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.15);
}

img{
    width:220px;
    max-width:90%;
    border-radius:15px;
}

#timer{
    font-size:70px;
    color:#ff5722;
    margin:20px;
}

#answer{
    display:none;
    font-size:40px;
    color:#2196F3;
    font-weight:bold;
}

button{
    margin:10px;
    padding:15px 30px;
    font-size:22px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#4CAF50;
    color:white;
}

button:hover{
    background:#43a047;
}

</style>

</head>

<body>

<header>

🌟 フラッシュ英語 🌟

</header>

<div class="container">

<h2>レベル1</h2>

<img src="https://upload.wikimedia.org/wikipedia/commons/1/15/Red_Apple.jpg">

<div id="timer">3</div>

<div id="answer">

Apple

</div>

<br>

<button onclick="showAnswer()">

答えを見る

</button>

<button onclick="speak()">

🔊 発音

</button>

</div>

<script>

let count = 3;

const timer = setInterval(function(){

count--;

if(count>=0){

document.getElementById("timer").innerHTML=count;

}

if(count<0){

clearInterval(timer);

}

},1000);

function showAnswer(){

document.getElementById("answer").style.display="block";

}

function speak(){

const speech=new SpeechSynthesisUtterance("Apple");

speech.lang="en-US";

speech.rate=0.9;

speechSynthesis.speak(speech);

}

</script>

</body>
</html>
